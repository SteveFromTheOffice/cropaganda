name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish Windows x64
        run: >
          dotnet publish src/Cropaganda/Cropaganda.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o out/windows

      - name: Zip Windows build
        run: Compress-Archive -Path out/windows/Cropaganda.exe -DestinationPath Cropaganda-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: Cropaganda-Windows.zip

  build-macos-arm64:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish macOS arm64
        run: >
          dotnet publish src/Cropaganda/Cropaganda.csproj
          -c Release
          -r osx-arm64
          --self-contained true
          -p:PublishSingleFile=false
          -o out/macos-arm64

      - name: Create .app bundle
        run: |
          APP=Cropaganda.app
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          cp -r out/macos-arm64/.             "$APP/Contents/MacOS/"

          chmod +x "$APP/Contents/MacOS/Cropaganda"

          cat > "$APP/Contents/Info.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>      <string>Cropaganda</string>
            <key>CFBundleIdentifier</key>      <string>com.mikew.cropaganda</string>
            <key>CFBundleName</key>            <string>Cropaganda</string>
            <key>CFBundleDisplayName</key>     <string>Cropaganda</string>
            <key>CFBundleVersion</key>         <string>1.0</string>
            <key>CFBundleShortVersionString</key> <string>1.0</string>
            <key>CFBundlePackageType</key>     <string>APPL</string>
            <key>LSMinimumSystemVersion</key>  <string>12.0</string>
            <key>NSHighResolutionCapable</key> <true/>
            <key>NSHumanReadableCopyright</key><string>© mikew</string>
          </dict>
          </plist>
          EOF

      - name: Ad-hoc sign .app bundle
        run: codesign --deep --force --sign - Cropaganda.app

      - name: Create .pkg installer
        run: |
          mkdir -p pkg-scripts
          cat > pkg-scripts/postinstall << 'EOF'
          #!/bin/bash
          xattr -cr /Applications/Cropaganda.app
          exit 0
          EOF
          chmod +x pkg-scripts/postinstall

          pkgbuild \
            --component Cropaganda.app \
            --install-location /Applications \
            --scripts pkg-scripts \
            --identifier com.mikew.cropaganda \
            --version 1.1 \
            Cropaganda-macOS-AppleSilicon.pkg

      - name: Zip .app bundle (preserving permissions)
        run: zip -r --symlinks Cropaganda-macOS-AppleSilicon.zip Cropaganda.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-build
          path: |
            Cropaganda-macOS-AppleSilicon.pkg
            Cropaganda-macOS-AppleSilicon.zip

  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Cropaganda ${{ github.ref_name }}"
          body: |
            ## 📥 Downloads

            | Platform | File |
            |---|---|
            | 🪟 Windows (x64) | `Cropaganda-Windows.zip` — extract and double-click `Cropaganda.exe` |
            | 🍎 macOS Apple Silicon (M1/M2/M3/M4) | `Cropaganda-macOS-AppleSilicon.pkg` |

            ### 🍎 macOS — first-run required step

            > ⚠️ **macOS will block this app on first launch.** You must allow it manually — this is a one-time step.

            1. Double-click `Cropaganda-macOS-AppleSilicon.pkg` — macOS will say it can't be opened
            2. Open **System Settings → Privacy & Security**
            3. Scroll down to the **Security** section — you'll see *"Cropaganda was blocked"*
            4. Click **Open Anyway** and enter your password
            5. The installer will run and Cropaganda will appear in `/Applications`

            **Prefer Terminal?**
            ```bash
            xattr -cr ~/Downloads/Cropaganda-macOS-AppleSilicon.pkg
            open ~/Downloads/Cropaganda-macOS-AppleSilicon.pkg
            ```
          files: |
            windows-build/Cropaganda-Windows.zip
            macos-arm64-build/Cropaganda-macOS-AppleSilicon.pkg
            macos-arm64-build/Cropaganda-macOS-AppleSilicon.zip
          draft: false
          prerelease: false
